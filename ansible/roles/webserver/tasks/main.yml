---
- name: Install nginx
  apt:
    name: nginx
    state: present

- name: Start nginx
  service:
    name: nginx
    state: started
    enabled: yes

- name: Create website directories
  file:
    path: "{{ item }}"
    state: directory
    owner: www-data
    group: www-data
    mode: '0755'
  loop:
    - /var/www/{{ domain }}/public
    - /var/www/{{ domain }}/logs

- name: Copy Nginx configuration
  template:
    src: nginx.conf.j2
    dest: /etc/nginx/sites-available/{{ domain }}
    owner: root
    group: root
    mode: '0644'
  notify: reload nginx

- name: Enable site configuration
  file:
    src: /etc/nginx/sites-available/{{ domain }}
    dest: /etc/nginx/sites-enabled/{{ domain }}
    state: link
  notify: reload nginx

- name: Remove default site
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: reload nginx

- name: Create sample index.html
  copy:
    content: |
      <html>
      <head><title>Welcome to {{ domain }}</title></head>
      <body>
        <h1>Environment: {{ environment }}</h1>
        <p>Server configured by Ansible</p>
      </body>
      </html>
    dest: /var/www/{{ domain }}/public/index.html
    owner: www-data
    group: www-data
    mode: '0644'