---
- name: Install nginx
  apt:
    name: nginx
    state: present

- name: Start and enable nginx
  service:
    name: nginx
    state: started
    enabled: yes

- name: Create custom index.html
  copy:
    content: |
      <html>
      <head><title>Welcome to Dev Environment</title></head>
      <body>
        <h1>Environment: dev</h1>
        <p>Server configured by Ansible</p>
      </body>
      </html>
    dest: /var/www/html/index.html
    mode: '0644'
